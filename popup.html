<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      max-height: 560px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111111;
      color: #e8e8e8;
      overflow-y: auto;
    }

    /* Header */
    .header {
      background: #111111;
      border-bottom: 2px solid #e63535;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-logo {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
    }
    .header-logo span { color: #e63535; }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #e63535;
      color: #fff;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 3px;
    }
    .live-dot {
      width: 5px; height: 5px;
      background: #fff;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Controls */
    .controls {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1e1e1e;
      background: #161616;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toggle-label { font-size: 12px; font-weight: 500; color: #aaa; }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #333;
      border-radius: 22px;
      transition: 0.3s;
    }
    .slider:before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }
    input:checked + .slider { background: #2e7d32; }
    input:checked + .slider:before { transform: translateX(18px); }

    .status {
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 3px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .status.on { background: #0f2e1a; color: #4ade80; border: 1px solid #166534; }
    .status.off { background: #2a1111; color: #f87171; border: 1px solid #7f1d1d; }

    /* Interval control */
    .interval-row {
      padding: 9px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1e1e1e;
      font-size: 11px;
      color: #666;
      background: #161616;
    }
    .interval-row select {
      background: #1e1e1e;
      color: #aaa;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      outline: none;
    }

    /* Posts */
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #444;
      padding: 10px 16px 6px;
    }
    .post {
      padding: 10px 16px;
      border-bottom: 1px solid #2e2e2e;
      cursor: pointer;
      transition: background 0.12s;
    }
    .post:hover { background: #161616; }
    .post-text {
      font-size: 13px;
      line-height: 1.5;
      color: #ddd;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-meta {
      display: flex;
      gap: 14px;
      margin-top: 6px;
      font-size: 11px;
      color: #555;
    }

    .media-grid {
      display: flex;
      gap: 4px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .media-thumb {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      flex: 1;
      min-width: 80px;
      height: 90px;
      background: #1a1a1a;
    }
    .media-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .media-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.45);
      font-size: 24px;
    }

    .rt-label {
      font-size: 11px;
      color: #444;
      margin-top: 7px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rt-url { color: #e63535; }

    .reblog-card {
      margin-top: 8px;
      border-left: 2px solid #e63535;
      border-radius: 0 6px 6px 0;
      padding: 8px 10px;
      background: #1a1a1a;
    }
    .reblog-label {
      font-size: 9px;
      font-weight: 800;
      color: #e63535;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .reblog-account {
      font-size: 11px;
      font-weight: 700;
      color: #ccc;
      margin-bottom: 3px;
    }
    .reblog-text {
      font-size: 12px;
      color: #888;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .link-card {
      margin-top: 8px;
      border: 1px solid #222;
      border-radius: 8px;
      overflow: hidden;
      background: #1a1a1a;
      cursor: pointer;
    }
    .link-card-img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      display: block;
    }
    .link-card-body { padding: 8px 10px; }
    .link-card-provider {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }
    .link-card-title {
      font-size: 12px;
      font-weight: 600;
      color: #ccc;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .link-card-desc {
      font-size: 11px;
      color: #555;
      margin-top: 3px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .load-more {
      padding: 11px 16px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: #e63535;
      cursor: pointer;
      border-top: 1px solid #1a1a1a;
      transition: background 0.12s;
    }
    .load-more:hover { background: #161616; }

    .full-text {
      font-size: 13px;
      line-height: 1.5;
      color: #ddd;
    }
    .expand-btn {
      font-size: 11px;
      color: #e63535;
      cursor: pointer;
      margin-top: 4px;
      display: inline-block;
    }
    .expand-btn:hover { opacity: 0.8; }

    .empty {
      padding: 32px 16px;
      text-align: center;
      color: #444;
      font-size: 13px;
    }

    /* Footer */
    .footer {
      padding: 10px 16px;
      text-align: center;
      font-size: 10px;
      color: #333;
      border-top: 1px solid #1a1a1a;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-logo">Trump Truth <span>Alerts</span></div>
    <div class="live-badge"><span class="live-dot"></span> Live</div>
  </div>

  <div class="controls">
    <div class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="enableToggle" checked>
        <span class="slider"></span>
      </label>
      <span class="toggle-label">Notifications</span>
    </div>
    <span class="status on" id="statusBadge">Active</span>
  </div>

  <div class="interval-row">
    <span>Check every</span>
    <select id="intervalSelect">
      <option value="60">1 minute</option>
      <option value="120">2 minutes</option>
      <option value="300">5 minutes</option>
    </select>
  </div>

  <div class="section-title">Recent Truths</div>
  <div id="postsList">
    <div class="empty">Loading…</div>
  </div>

  <div class="footer">Not affiliated with Truth Social or President Trump.</div>

  <script src="popup.js"></script>
</body>
</html>
